spread-task: Name of spread task as defined by spread (e.g. tests/main/ack)
spread-system: Name of spread system (if not specified, then task will be skipped on all systems)
spread-backend: Name of spread backend (if not specified, then task will be skipped on all systems)
skip-until: yyyy-MM-dd
skip-reason: Reason why test can be skipped (include Jira card if relevant)
